                    <a href="../../inicio.html" class="brand-logo">
                        <img src="../../Imagenes/Main/LOGO.png" width="200px">
                    </a>

                </section>
            </div>
        </header>
        <div class="container">
            <div class="digimon-control"> 
                <div class="digimon-buscador"> 
                    <form>
                        <div class="digimon-filtro">
                            <div class="digi-icon-filter">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75"/>
                                </svg>
                                <span>Filtrar</span>
                            </div>
                        </div>
                        <div class="digimon-search-bar">
                            <svg xmlns="http://www.w3.org/2000/svg"fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="icon-search">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
                            </svg>
                            <input type="search" placeholder="Buscar Nombre" id="digi-search-id"/>
                        </div>
                    </form>
                </div>
            </div>
            <div class="mostrar-digimon">
                <div class="digimon-container" id="listado-digimon">
                    
                </div>
            </div>
            <div class="digimon-filtros">
                <form class="digimon-filtro-tipos">
                    <ion-icon name="close-circle-outline" class="digimon-filtro-close"></ion-icon>
                    <span>Nivel:</span>
                    <div class="digi-tipo">
                        <input type="checkbox" name="In Training" value="In Training" class="filtro-box"/>
                        <label for="In Training">In Training</label>
                    </div>
                    <div class="digi-tipo">
                        <input type="checkbox" name="Fresh" value="Fresh" class="filtro-box"/>
                        <label for="Fresh">Fresh</label>
                    </div>
                    <div class="digi-tipo">
                        <input type="checkbox" name="Rookie" value="Rookie" class="filtro-box"/>
                        <label for="Rookie">Rookie</label>
                    </div>
                    <div class="digi-tipo">
                        <input type="checkbox" name="Champion" value="Champion" class="filtro-box"/>
                        <label for="Champion">Champion</label>
                    </div>
                    <div class="digi-tipo">
                        <input type="checkbox" name="Armor" value="Armor" class="filtro-box"/>
                        <label for="Armor">Armor</label>
                    </div>
                    <div class="digi-tipo">
                        <input type="checkbox" name="Mega" value="Mega" class="filtro-box"/>
                        <label for="Mega">Mega</label>
                    </div>
                    <div class="digi-tipo">
                        <input type="checkbox" name="Ultimate" value="Ultimate" class="filtro-box"/>
                        <label for="Ultimate">Ultimate</label>
                    </div>
                </form>
            </div>
        </div>
        <a href="#cont-up" id="btn-up" class="boton-subir"><ion-icon name="arrow-up-outline"></ion-icon></a>
